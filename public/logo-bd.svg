<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo -->
  <rect width="200" height="60" rx="8" fill="#0b1624" opacity="0"/>

  <!-- Texto "Brasil Digital" -->
  <text x="50" y="38" font-family="Rajdhani, sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    BRASIL
  </text>
  <text x="50" y="52" font-family="Rajdhani, sans-serif" font-size="12" font-weight="500" fill="#00d4ff" letter-spacing="1">
    DIGITAL
  </text>

  <!-- Ícone/Símbolo BD -->
  <g transform="translate(20, 15)">
    <!-- Círculo externo -->
    <circle cx="12" cy="12" r="11" stroke="#00d4ff" stroke-width="1.5" fill="none"/>

    <!-- B -->
    <text x="4" y="16" font-family="Rajdhani, sans-serif" font-size="14" font-weight="700" fill="#00d4ff">B</text>

    <!-- D -->
    <text x="16" y="16" font-family="Rajdhani, sans-serif" font-size="14" font-weight="700" fill="#0081f1">D</text>

    <!-- Linhas de conexão -->
    <line x1="8" y1="8" x2="16" y2="8" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="8" y1="16" x2="16" y2="16" stroke="#0081f1" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
